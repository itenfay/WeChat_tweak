name: Build DEB Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths:
      - 'WeChatPluginDev/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Setup Roothide Theos
        run: |
          # Clone roothide theos to a separate directory
          git clone --depth=1 https://github.com/roothide/theos.git ${{ github.workspace }}/theos-roothide
          # Download roothide SDK
          curl -LO https://github.com/roothide/theos/releases/download/v1.0.0/roothide-sdk.zip || true
          if [ -f roothide-sdk.zip ]; then
            unzip -o roothide-sdk.zip -d ${{ github.workspace }}/theos-roothide/sdks/ || true
          fi

      - name: Debug Environment
        run: |
          echo "=== Environment Variables ==="
          echo "THEOS=$THEOS"
          echo "HOME=$HOME"
          echo "PWD=$PWD"
          echo "=== Theos Directory ==="
          ls -la $THEOS || echo "THEOS directory not found"
          echo "=== Project Directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/
          echo "=== Source Files ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/src/
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Rootless Package (arm64 + arm64e)
        run: |
          cd WeChatPluginDev/wapleodtcorexpc
          rm -rf packages/*.deb 2>/dev/null || true
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 || {
            echo "=== Build failed, showing detailed errors ==="
            make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          }
          # Rename rootless package
          for f in packages/*.deb; do
            if [ -f "$f" ]; then
              newname=$(echo "$f" | sed 's/\.deb$/-rootless.deb/')
              mv "$f" "$newname"
            fi
          done
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Roothide Package (arm64 + arm64e)
        run: |
          cd WeChatPluginDev/wapleodtcorexpc
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide 2>&1 || {
            echo "=== Build failed, showing detailed errors ==="
            make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
          }
          # Rename roothide package
          for f in packages/*.deb; do
            if [ -f "$f" ] && [[ ! "$f" == *"-rootless.deb" ]]; then
              newname=$(echo "$f" | sed 's/\.deb$/-roothide.deb/')
              mv "$f" "$newname"
            fi
          done
        env:
          THEOS: ${{ github.workspace }}/theos-roothide

      - name: List packages (debug)
        if: always()
        run: |
          echo "=== Listing packages directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/packages/ || echo "packages directory not found"
          echo "=== Finding all .deb files ==="
          find . -name "*.deb" -type f 2>/dev/null || echo "No .deb files found"
          echo "=== Listing obj directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/.theos/obj/ 2>/dev/null || echo "obj directory not found"

      - name: Upload Rootless Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootless-deb
          path: WeChatPluginDev/wapleodtcorexpc/packages/*-rootless.deb
          if-no-files-found: warn

      - name: Upload Roothide Artifact
        uses: actions/upload-artifact@v4
        with:
          name: roothide-deb
          path: WeChatPluginDev/wapleodtcorexpc/packages/*-roothide.deb
          if-no-files-found: warn

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: WeChatPluginDev/wapleodtcorexpc/packages/*.deb
