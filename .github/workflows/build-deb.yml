name: Build DEB Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths:
      - 'WeChatPluginDev/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Setup Roothide Theos
        run: |
          ROOTHIDE_THEOS="${{ github.workspace }}/theos-roothide"

          # Clone roothide theos to a separate directory
          git clone --depth=1 https://github.com/roothide/theos.git "$ROOTHIDE_THEOS"

          # Download roothide SDK
          curl -LO https://github.com/roothide/theos/releases/download/v1.0.0/roothide-sdk.zip || true
          if [ -f roothide-sdk.zip ]; then
            unzip -o roothide-sdk.zip -d "$ROOTHIDE_THEOS/sdks/" || true
          fi

          # Install vendor dependencies (include/lib)
          echo "=== Installing vendor dependencies ==="
          # Clone lib directory
          git clone --depth=1 https://github.com/theos/lib.git "$ROOTHIDE_THEOS/vendor/lib" || true
          # Clone include directory
          git clone --depth=1 https://github.com/theos/headers.git "$ROOTHIDE_THEOS/vendor/include" || true

          # Fix dm.pl for roothide theos
          if [ ! -f "$ROOTHIDE_THEOS/bin/dm.pl" ]; then
            echo "dm.pl not found in roothide theos, installing..."
            git clone --depth=1 https://github.com/theos/dm.pl.git "$ROOTHIDE_THEOS/vendor/dm.pl" || true
            mkdir -p "$ROOTHIDE_THEOS/bin"
            ln -sf ../vendor/dm.pl/dm.pl "$ROOTHIDE_THEOS/bin/dm.pl" || true
            chmod +x "$ROOTHIDE_THEOS/vendor/dm.pl/dm.pl" || true
          fi

          # Verify installation
          echo "=== Verifying roothide theos ==="
          ls -la "$ROOTHIDE_THEOS/vendor/" || true
          ls -la "$ROOTHIDE_THEOS/bin/dm.pl" || true

      - name: Debug Environment
        run: |
          echo "=== Environment Variables ==="
          echo "THEOS=$THEOS"
          echo "HOME=$HOME"
          echo "PWD=$PWD"
          echo "=== Theos Directory ==="
          ls -la $THEOS || echo "THEOS directory not found"
          echo "=== Theos bin Directory ==="
          ls -la $THEOS/bin/ || echo "THEOS bin directory not found"
          echo "=== Check dm.pl ==="
          ls -la $THEOS/bin/dm.pl || echo "dm.pl not found in bin"
          ls -la $THEOS/vendor/dm.pl/ || echo "dm.pl vendor not found"
          echo "=== Project Directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/
          echo "=== Source Files ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/src/
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Fix dm.pl if missing
        run: |
          # Check if dm.pl exists
          if [ ! -f "$THEOS/bin/dm.pl" ]; then
            echo "dm.pl not found, installing..."
            # Clone dm.pl to vendor directory
            git clone --depth=1 https://github.com/theos/dm.pl.git "$THEOS/vendor/dm.pl" || true
            # Create symlink
            ln -sf ../vendor/dm.pl/dm.pl "$THEOS/bin/dm.pl" || true
            chmod +x "$THEOS/vendor/dm.pl/dm.pl" || true
          fi
          # Verify
          echo "=== Verifying dm.pl ==="
          ls -la "$THEOS/bin/dm.pl"
          "$THEOS/bin/dm.pl" --help 2>&1 | head -5 || echo "dm.pl test failed"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Rootless Package (arm64 + arm64e)
        run: |
          export PATH="$THEOS/bin:$PATH"
          cd WeChatPluginDev/wapleodtcorexpc
          rm -rf packages/*.deb 2>/dev/null || true
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 || {
            echo "=== Build failed, showing detailed errors ==="
            make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          }
          # Rename rootless package
          for f in packages/*.deb; do
            if [ -f "$f" ]; then
              newname=$(echo "$f" | sed 's/\.deb$/-rootless.deb/')
              mv "$f" "$newname"
            fi
          done
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Roothide Package (arm64 + arm64e)
        run: |
          export PATH="$THEOS/bin:$PATH"
          cd WeChatPluginDev/wapleodtcorexpc
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide 2>&1 || {
            echo "=== Build failed, showing detailed errors ==="
            make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
          }
          # Rename roothide package
          for f in packages/*.deb; do
            if [ -f "$f" ] && [[ ! "$f" == *"-rootless.deb" ]]; then
              newname=$(echo "$f" | sed 's/\.deb$/-roothide.deb/')
              mv "$f" "$newname"
            fi
          done
        env:
          THEOS: ${{ github.workspace }}/theos-roothide

      - name: List packages (debug)
        if: always()
        run: |
          echo "=== Listing packages directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/packages/ || echo "packages directory not found"
          echo "=== Finding all .deb files ==="
          find . -name "*.deb" -type f 2>/dev/null || echo "No .deb files found"
          echo "=== Listing obj directory ==="
          ls -la WeChatPluginDev/wapleodtcorexpc/.theos/obj/ 2>/dev/null || echo "obj directory not found"

      - name: Upload Rootless Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootless-deb
          path: WeChatPluginDev/wapleodtcorexpc/packages/*-rootless.deb
          if-no-files-found: warn

      - name: Upload Roothide Artifact
        uses: actions/upload-artifact@v4
        with:
          name: roothide-deb
          path: WeChatPluginDev/wapleodtcorexpc/packages/*-roothide.deb
          if-no-files-found: warn

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: WeChatPluginDev/wapleodtcorexpc/packages/*.deb
